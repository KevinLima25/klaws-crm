services:
  waha:
    image: devlikeapro/waha
    container_name: waha
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Acesso ao Dashboard / Swagger (http://localhost:3000/dashboard)
      - WAHA_DASHBOARD_USERNAME=USERNAME_REMOVED
      - WAHA_DASHBOARD_PASSWORD=PASSWORD_REMOVED
      - WHATSAPP_SWAGGER_USERNAME=USERNAME_REMOVED
      - WHATSAPP_SWAGGER_PASSWORD=PASSWORD_REMOVED
      # Chave usada nas requisições da API (header X-Api-Key) e nas credenciais do n8n
      - WAHA_API_KEY=WAHA_API_KEY_REMOVED
      - TZ=America/Sao_Paulo
      # Webhook para o n8n
      - WHATSAPP_HOOK_URL=http://host.docker.internal:5678/webhook/waha
      - WHATSAPP_HOOK_EVENTS=message.any
    volumes:
      # Sessões do WhatsApp — mantém o login após reiniciar
      - ./waha/sessions:/app/.sessions
      # Mídias recebidas/enviadas
      - ./waha/media:/app/.media
    networks:
      - automation

  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      # URL usada pelos webhooks
      - N8N_WEBHOOK_URL=https://thread-urologist-catching.ngrok-free.dev/
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      - N8N_PROXY_HOPS=1

      # IMPORTANTE: defina uma chave fixa. Se mudar, perde acesso às credenciais salvas.
      - N8N_ENCRYPTION_KEY=N8N_ENCRYPTION_KEY_REMOVED
      - N8N_RUNNERS_ENABLED=true
    volumes:
      # Banco SQLite, credenciais, workflows e configs do n8n
      - ./n8n/data:/home/node/.n8n
      # Pasta para ler/escrever arquivos do host dentro dos workflows
      - ./n8n/files:/files
    networks:
      - automation

  crm:
    build:
      context: ./crm
      dockerfile: Dockerfile
    container_name: crm
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./crm:/app
      - /app/node_modules
      - /app/.next
    environment:
      - PORT=3000
    networks:
      - automation

networks:
  automation:
    driver: bridge
