services:
  crm:
    build:
      context: ./crm
      dockerfile: Dockerfile
    container_name: crm
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./crm:/app
      - /app/node_modules
      - /app/.next
    environment:
      - PORT=3000
    networks:
      - automation

networks:
  automation:
    driver: bridge
